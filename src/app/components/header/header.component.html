<header class="header">
  <picture>
    <source srcset="assets/images/hero.webp" type="image/webp" />
    <img
      class="header__bg"
      src="assets/images/hero.jpg"
      alt=""
      aria-hidden="true"
      fetchpriority="high"
      decoding="sync"
    />
  </picture>
  <app-nav></app-nav>
  <div class="section__container header__container">
    <div class="header__content">
      <p class="section__subheader" appScrollReveal>UM GUIA DE MERGULHO</p>
      <h1 class="section__header" appScrollReveal [srDelay]="500">
        Esteja preparado para os corais e além!
      </h1>
      <div class="scroll__btn" appScrollReveal [srDelay]="1000">
        <a href="#about">
          Scroll down
          <span><i class="ri-arrow-down-line"></i></span>
        </a>
      </div>
    </div>
    <div class="header__socials" appScrollReveal srOrigin="left" [srDelay]="1500">
      <span>Segue lá</span>
      <a href="#"><i class="ri-instagram-line"></i></a>
      <a href="#"><i class="ri-twitter-fill"></i></a>
    </div>
  </div>
</header>
